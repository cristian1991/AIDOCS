name: Auto Merge Owner PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.user.login == 'cristian1991' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.graphql(
                `mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: MERGE
                  }) {
                    clientMutationId
                  }
                }`,
                {
                  pullRequestId: context.payload.pull_request.node_id,
                }
              )
            } catch (error) {
              if (String(error.message).includes('already')) {
                core.info('Auto-merge already enabled for this PR.')
                return
              }
              throw error
            }
