name: Auto Merge Owner PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-owner-pr:
    if: github.event.pull_request.user.login == 'cristian1991' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Merge owner PR when ready
        uses: actions/github-script@v7
        with:
          script: |
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms))
            const owner = context.repo.owner
            const repo = context.repo.repo
            const pull_number = context.payload.pull_request.number

            for (let attempt = 1; attempt <= 20; attempt++) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number,
              })

              if (pr.state !== 'open') {
                core.info(`PR is already ${pr.state}; nothing to do.`)
                return
              }

              if (pr.mergeable === true) {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number,
                  merge_method: 'merge',
                })
                core.info(`Merged PR #${pull_number} on attempt ${attempt}.`)
                return
              }

              core.info(`PR #${pull_number} not mergeable yet (attempt ${attempt}/20, mergeable=${pr.mergeable}, state=${pr.mergeable_state}). Retrying in 15 seconds.`)
              await sleep(15000)
            }

            core.setFailed('PR did not become mergeable within the retry window.')
